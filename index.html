
<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; background: transparent; }
    model-viewer { width: 100%; height: 100vh; background: transparent; }
  </style>
</head>
<body>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  
  <model-viewer
    src="brain_hologram.glb"
    alt="3D Model"
    auto-rotate
    auto-rotate-delay="100"
    rotation-per-second="20deg"
    camera-controls
    interaction-prompt="none"
    camera-orbit="0deg 75deg 6m"
    camera-target="0m 0m 0m"
    min-camera-orbit="auto auto 2m"
    max-camera-orbit="auto auto 6m"
    style="width:100%; height:100vh; background: transparent;">
  </model-viewer>

</body>
</html>
